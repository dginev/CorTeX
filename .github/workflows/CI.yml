name: CI

on: [push, pull_request]

# Mirrors the local quality gates (`.githooks/`: pre-commit `cargo fmt --check`, pre-push
# `cargo fmt` + `cargo clippy -D warnings`) plus the integration test suite, against the same
# install requirements as INSTALL.md / CLAUDE.md.
#
# Notable current-state facts encoded here:
#   * Redis is NO LONGER a dependency — frontend reports are served from the `report_summary`
#     materialized-view rollup (Arm 14 #6), so no redis-server step.
#   * Toolchain is floating nightly (`rust-toolchain.toml`); installed via the maintained
#     `dtolnay/rust-toolchain` action (the old `actions-rs/*` actions are archived/unmaintained).
#   * Migrations are embedded in the binaries, but we still apply them with diesel_cli 2.x here so
#     the schema (incl. the hand-SQL matview migrations) is present before the tests connect.
#   * latexmlc is not installed, so `tex_to_html_test` skips itself (by design).
#
# Known flake: a few integration binaries that build a Rocket `Client` over an r2d2/libpq pool
# SIGSEGV during process *teardown* after their tests pass (KNOWN_ISSUES L-1, pre-existing, not
# fixable in our code today). The `scripts/ci_test.sh` wrapper in the Tests step tolerates ONLY that
# teardown SIGSEGV (every assertion still passed) while failing CI on any real failure.

jobs:
  test:
    name: build + test
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://cortex:cortex@localhost/cortex
      TEST_DATABASE_URL: postgres://cortex_tester:cortex_tester@localhost/cortex_tester
      # Each integration binary builds a Rocket Client whose pool is sized from
      # `config().database.pool_size` (default 32); parallel tests multiply that and exhaust
      # PostgreSQL's default `max_connections=100` ("too many clients already"). Cap the test pool
      # small (the blocking Client uses one connection at a time) and give Postgres headroom below.
      CORTEX_DATABASE__POOL_SIZE: "8"
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            postgresql postgresql-contrib libpq-dev \
            libarchive-dev libsodium-dev libzmq3-dev pkg-config

      - name: Start PostgreSQL
        run: sudo systemctl start postgresql.service

      - name: Raise max_connections (headroom for the connection-hungry test suite)
        run: |
          sudo -u postgres psql -c "ALTER SYSTEM SET max_connections = 300;"
          sudo systemctl restart postgresql.service

      - name: Provision databases and roles
        run: |
          sudo -u postgres psql -c "CREATE USER cortex WITH PASSWORD 'cortex';"
          sudo -u postgres psql -c "CREATE USER cortex_tester WITH PASSWORD 'cortex_tester';"
          sudo -u postgres psql -c "CREATE DATABASE cortex OWNER cortex;"
          sudo -u postgres psql -c "CREATE DATABASE cortex_tester OWNER cortex_tester;"
          # PG15+ no longer grants CREATE on `public` to PUBLIC; grant it to the db owners explicitly.
          sudo -u postgres psql -d cortex        -c "GRANT ALL ON SCHEMA public TO cortex;"
          sudo -u postgres psql -d cortex_tester -c "GRANT ALL ON SCHEMA public TO cortex_tester;"

      - name: Install Rust (nightly + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Install diesel_cli (postgres only)
        run: cargo install diesel_cli --no-default-features --features postgres --locked

      - name: Apply migrations to both databases
        run: |
          diesel migration run --database-url "$DATABASE_URL"
          diesel migration run --database-url "$TEST_DATABASE_URL"
          # `diesel.toml` has `print_schema`, so `migration run` rewrites src/schema.rs. The committed
          # one is the source of truth (kept honest by scripts/verify_migrations.sh); discard any
          # CI-side regeneration so a differing diesel_cli version can't trip `cargo fmt --check`.
          git checkout -- src/schema.rs

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (warnings are errors)
        run: cargo clippy --all-targets -- -D warnings

      - name: Provide test auth fixtures
        # The integration tests sign in / authenticate as `token1` (resolved through
        # config().auth.rerun_tokens). Those tokens live in config.json, which is gitignored (it is a
        # real deployment's secrets file), so CI materializes it from the shipped template — which
        # carries exactly the test fixtures token1/token2 used by the suite.
        run: cp config.default.json config.json

      - name: Tests
        # Wrapper runs the full suite and fails on real failures, but tolerates ONLY the pre-existing
        # L-1 teardown SIGSEGV (a diesel/libpq/Tokio teardown race in Rocket-Client-over-pool binaries
        # that crashes AFTER all assertions pass; reproduced on clean master — KNOWN_ISSUES L-1).
        run: bash scripts/ci_test.sh
